name: Preprod Pipeline - Build, Test & Deploy to Staging

on:
  push:
    branches:
      - preprod

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Dependencies
        working-directory: ./repo
        run: |
          npm install

      - name: Run Tests
        working-directory: ./repo
        run: |
          npm test

  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    environment: staging   # <-- this triggers manual approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Staging S3
        working-directory: ./repo
        run: |
          aws s3 sync . s3://${{ secrets.STAGING_S3_BUCKET_NAME }} --delete